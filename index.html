<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PhoneFlip</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhoneFlip">
<meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1c1c20;
  --border: #2a2a30;
  --text: #e8e8ec;
  --muted: #6b6b78;
  --accent: #22c55e;
  --accent2: #16a34a;
  --red: #ef4444;
  --yellow: #f59e0b;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-bottom: env(safe-area-inset-bottom, 20px);
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}
html { height: -webkit-fill-available; }
input, button { font-family: 'Outfit', sans-serif; -webkit-appearance: none; }
select { font-family: 'Outfit', sans-serif; }
input[type="text"], input[type="number"], input[type="date"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--accent); }
input[type="number"]::-webkit-inner-spin-button { display: none; }
::placeholder { color: var(--muted); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.container { max-width: 600px; margin: 0 auto; padding: 16px 14px; padding-top: max(16px, env(safe-area-inset-top, 16px)); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.header h1 span { font-size: 24px; }
.subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 10px; padding: 10px 16px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  box-shadow: 0 2px 12px rgba(34,197,94,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.btn-add:active { transform: scale(0.96); }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
.tab {
  flex: 1; padding: 9px 0; text-align: center; font-size: 12px; font-weight: 500;
  border: none; background: transparent; color: var(--muted); cursor: pointer;
  border-radius: 8px; transition: all 0.2s; white-space: nowrap;
}
.tab.active { background: var(--surface2); color: var(--text); font-weight: 600; }

/* Modal */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
}
.overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 20px));
  width: 100%; max-width: 600px; border: 1px solid var(--border); border-bottom: none;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
  animation: slideUp 0.3s ease;
  max-height: 85vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 18px; }
.form-grid { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
.form-hint { font-size: 11px; color: var(--muted); }
.form-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn-submit {
  flex: 1; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 13px 0; font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-submit:active { opacity: 0.85; }
.btn-cancel {
  flex: 1; background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 0; font-size: 15px; cursor: pointer;
}

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.stat-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; border: 1px solid var(--border);
}
.stat-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.stat-value { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Best/worst */
.deals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.deal-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 14px; border: 1px solid var(--border);
}
.deal-card.best { border-left: 3px solid var(--accent); }
.deal-card.worst-loss { border-left: 3px solid var(--red); }
.deal-card.worst-ok { border-left: 3px solid var(--muted); }
.deal-label { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.deal-name { font-size: 13px; font-weight: 600; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deal-profit { font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* Calendar */
.chart-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; border: 1px solid var(--border); margin-bottom: 18px;
}
.chart-title { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.cal-nav { display: flex; gap: 6px; align-items: center; }
.cal-nav button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.cal-nav button:active { background: var(--border); }
.cal-total { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 6px 0 12px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-head {
  font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0;
  font-family: 'JetBrains Mono', monospace; font-weight: 600;
}
.cal-day {
  aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; font-size: 12px; position: relative;
  transition: background 0.15s;
}
.cal-day.empty { opacity: 0; }
.cal-day.today { border: 1px solid var(--accent); }
.cal-day .day-num { font-weight: 500; color: var(--muted); font-size: 11px; }
.cal-day .day-profit {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
  margin-top: 1px; white-space: nowrap;
}
.cal-day.has-profit { background: rgba(34,197,94,0.1); }
.cal-day.has-loss { background: rgba(239,68,68,0.1); }
.chart-empty { color: var(--muted); text-align: center; padding: 30px 0; font-size: 13px; }

/* Trade list (card-based for mobile) */
.trade-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 8px; transition: background 0.15s;
}
.trade-card:active { background: var(--surface2); }
.trade-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.trade-name { font-weight: 600; font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
.status-badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 600; flex-shrink: 0; }
.status-sold { background: #d1fae5; color: #065f46; }
.status-stock { background: #fef3c7; color: #92400e; }
.trade-bottom { display: flex; justify-content: space-between; align-items: center; }
.trade-prices { display: flex; gap: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.trade-price-label { color: var(--muted); font-size: 10px; display: block; }
.trade-profit { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; text-align: right; }
.trade-margin { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; text-align: right; opacity: 0.7; }
.trade-date { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }
.trade-actions { display: flex; gap: 2px; margin-top: 8px; justify-content: flex-end; border-top: 1px solid var(--border); padding-top: 8px; }
.action-btn {
  background: var(--surface2); border: 1px solid var(--border); cursor: pointer;
  font-size: 12px; padding: 6px 14px; border-radius: 8px; color: var(--muted);
  transition: all 0.15s;
}
.action-btn:active { background: var(--border); }

.filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.filter-row select { width: auto; min-width: 140px; font-size: 14px; }
.filter-count { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

.empty-state {
  text-align: center; padding: 50px 20px;
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
}
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-text { color: var(--muted); font-size: 14px; }

.footer {
  text-align: center; padding: 20px 0 8px;
  font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
}

.export-btn {
  background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px; font-size: 11px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; margin-left: auto;
}
.export-btn:active { background: var(--border); }

.qty-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 18px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.qty-btn:active { background: var(--border); }

.theme-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background 0.15s;
}
.theme-btn:active { background: var(--border); }

.light {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #e8e8ed;
  --border: #c6c6cc;
  --text: #1a1a1a;
  --muted: #6e6e73;
}
.light .modal { background: var(--surface); }
.light tbody tr:hover { background: #eee !important; }
.light .chart-bar .tooltip { background: #fff; border-color: var(--border); }
.light select, .light input[type="text"], .light input[type="number"], .light input[type="date"] {
  background: var(--surface2); border-color: var(--border); color: var(--text);
}

/* PVZ */
.pvz-total-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 16px; border: 1px solid var(--border); margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.pvz-total-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.pvz-total-value { font-size: 24px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.pvz-total-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pvz-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
}
.pvz-card:active { background: var(--surface2); }
.pvz-left { flex: 1; }
.pvz-amount { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; }
.pvz-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.pvz-cashback { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); text-align: right; }
.pvz-pct { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-align: right; margin-top: 2px; }

/* Release */
.rel-name-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 16px; margin-bottom: 12px;
}
.rel-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.rel-stat {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 14px 16px;
}
.rel-stat-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
.rel-stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.rel-card {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 12px 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
}
.rel-card:active { background: var(--surface2); }
.rel-card-name { font-weight: 600; font-size: 13px; }
.rel-card-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.rel-card-earn { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1><span>📱</span> PhoneFlip</h1>
      <p class="subtitle">трекер перепродаж</p>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <button class="btn-add" onclick="openForm()">+ Продажа</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard',this)">📊 Обзор</button>
    <button class="tab" onclick="switchTab('trades',this)">📋 Продажи</button>
    <button class="tab" onclick="switchTab('pvz',this)">💸 ПВЗ</button>
    <button class="tab" onclick="switchTab('release',this)">📦 Релиз</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboardTab">
    <div id="stats"></div>
    <div id="bestWorst"></div>
    <div id="chart"></div>
  </div>

  <!-- Trades -->
  <div id="tradesTab" style="display:none">
    <div class="filter-row">
      <select id="monthFilter" onchange="render()"></select>
      <span class="filter-count" id="countLabel"></span>
      <button class="export-btn" onclick="exportCSV()">📥 CSV</button>
    </div>
    <div id="tradesList"></div>
  </div>

  <!-- PVZ -->
  <div id="pvzTab" style="display:none">
    <div id="pvzStats"></div>
    <div class="filter-row">
      <select id="pvzMonthFilter" onchange="renderPvz()"></select>
      <span class="filter-count" id="pvzCountLabel"></span>
      <button class="btn-add" style="margin-left:auto;padding:8px 14px;font-size:13px" onclick="openPvzForm()">+ Заказ</button>
    </div>
    <div id="pvzList"></div>
  </div>

  <!-- Release -->
  <div id="releaseTab" style="display:none">
    <div id="relStats"></div>
    <div class="filter-row">
      <select id="relMonthFilter" onchange="renderRelease()"></select>
      <select id="relOwnerFilter" onchange="renderRelease()" style="width:auto;min-width:100px;font-size:14px"></select>
      <span class="filter-count" id="relCountLabel"></span>
      <button class="btn-add" style="margin-left:auto;padding:8px 14px;font-size:13px" onclick="openRelForm()">+ Продажа</button>
    </div>
    <div id="relList"></div>
  </div>

  <div class="footer">PhoneFlip v1.0</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="formTitle">Новая продажа</h2>
    <div class="form-grid">
      <div>
        <label class="form-label">Модель</label>
        <select id="fModel" onchange="onModelChange()">
          <option value="">Выбрать модель...</option>
        </select>
      </div>
      <div class="form-row" id="storageColorRow" style="display:none">
        <div>
          <label class="form-label">Память</label>
          <select id="fStorage"></select>
        </div>
        <div>
          <label class="form-label">Цвет</label>
          <select id="fColor"></select>
        </div>
      </div>
      <div id="manualNameRow">
        <label class="form-label">Или вручную</label>
        <input type="text" id="fName" placeholder="Другая модель...">
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Купил ₽</label>
          <input type="number" id="fBuy" placeholder="50000" inputmode="numeric">
        </div>
        <div>
          <label class="form-label">Продал ₽</label>
          <input type="number" id="fSell" placeholder="58000" inputmode="numeric">
        </div>
      </div>
      <div class="form-row" id="qtyDateRow">
        <div id="qtyField">
          <label class="form-label">Кол-во</label>
          <div style="display:flex;align-items:center;gap:8px">
            <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
            <input type="number" id="fQty" value="1" min="1" max="50" inputmode="numeric" style="text-align:center">
            <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div>
          <label class="form-label">Дата</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <p class="form-hint">Без цены продажи → статус «В наличии»</p>
      <div class="form-actions">
        <button class="btn-submit" onclick="submitForm()" id="btnSubmit">Добавить</button>
        <button class="btn-cancel" onclick="closeForm()">Отмена</button>
      </div>
    </div>
  </div>
</div>

<!-- PVZ Modal -->
<div class="overlay" id="pvzOverlay" onclick="if(event.target===this)closePvzForm()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="pvzFormTitle">Новый заказ</h2>
    <div class="form-grid">
      <div>
        <label class="form-label">Сумма заказа ₽</label>
        <input type="number" id="pvzAmount" placeholder="5000" inputmode="numeric">
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Процент %</label>
          <input type="number" id="pvzPercent" value="2.5" step="0.1" inputmode="decimal">
        </div>
        <div>
          <label class="form-label">Дата</label>
          <input type="date" id="pvzDate">
        </div>
      </div>
      <div id="pvzPreview" style="background:var(--surface2);border-radius:10px;padding:12px 14px;text-align:center;display:none">
        <div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px">КЭШБЭК</div>
        <div id="pvzPreviewValue" style="font-size:22px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace"></div>
      </div>
      <div class="form-actions">
        <button class="btn-submit" onclick="submitPvzForm()" id="pvzBtnSubmit">Добавить</button>
        <button class="btn-cancel" onclick="closePvzForm()">Отмена</button>
      </div>
    </div>
  </div>
</div>

<!-- Release Modal -->
<div class="overlay" id="relOverlay" onclick="if(event.target===this)closeRelForm()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="relFormTitle">Новая продажа</h2>
    <div class="form-grid">
      <div>
        <label class="form-label">Владелец</label>
        <select id="relOwner">
          <option value="">Выбрать...</option>
          <option value="Егор">Егор</option>
          <option value="Дима">Дима</option>
        </select>
      </div>
      <div>
        <label class="form-label">Модель</label>
        <select id="relModel" onchange="onRelModelChange()">
          <option value="">Выбрать модель...</option>
        </select>
      </div>
      <div class="form-row" id="relStorageColorRow" style="display:none">
        <div>
          <label class="form-label">Память</label>
          <select id="relStorage"></select>
        </div>
        <div>
          <label class="form-label">Цвет</label>
          <select id="relColor"></select>
        </div>
      </div>
      <div id="relManualNameRow">
        <label class="form-label">Или вручную</label>
        <input type="text" id="relName" placeholder="Другая модель...">
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Цена продажи ₽</label>
          <input type="number" id="relSellPrice" placeholder="60000" inputmode="numeric">
        </div>
        <div>
          <label class="form-label">Ставка ₽</label>
          <input type="number" id="relRate" value="1000" inputmode="numeric">
        </div>
      </div>
      <div>
        <label class="form-label">Дата</label>
        <input type="date" id="relDate">
      </div>
      <div class="form-actions">
        <button class="btn-submit" onclick="submitRelForm()" id="relBtnSubmit">Добавить</button>
        <button class="btn-cancel" onclick="closeRelForm()">Отмена</button>
      </div>
    </div>
  </div>
</div>


<script>
// --- Telegram WebApp ---
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}

function haptic(type) {
  try { if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type || "light"); } catch(e){}
}

// --- Theme ---
function getInitialTheme() {
  const saved = localStorage.getItem("phoneflip-theme");
  if (saved) return saved;
  if (tg && tg.colorScheme === "light") return "light";
  return "dark";
}

function applyTheme(theme) {
  if (theme === "light") {
    document.documentElement.classList.add("light");
  } else {
    document.documentElement.classList.remove("light");
  }
  document.getElementById("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
  localStorage.setItem("phoneflip-theme", theme);
}

function toggleTheme() {
  haptic("light");
  const current = document.documentElement.classList.contains("light") ? "light" : "dark";
  applyTheme(current === "dark" ? "light" : "dark");
}

applyTheme(getInitialTheme());

// --- Constants ---
const STORAGE_KEY = "phone-trades-v1";
const PVZ_STORAGE_KEY = "phone-pvz-v1";
const REL_STORAGE_KEY = "phone-rel-v1";
const MONTHS_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

const IPHONE_MODELS = [
  { label: "iPhone 17", storages: ["256GB","512GB"], colors: ["Lavender","Sage","Mist Blue","White","Black"] },
  { label: "iPhone Air", storages: ["256GB","512GB"], colors: ["Space Black","Cloud White","Light Gold","Sky Blue"] },
  { label: "iPhone 17 Pro", storages: ["256GB","512GB","1TB"], colors: ["Silver","Deep Blue","Cosmic Orange"] },
  { label: "iPhone 17 Pro Max", storages: ["256GB","512GB","1TB"], colors: ["Silver","Deep Blue","Cosmic Orange"] },
];

let trades = [];
let pvzOrders = [];
let relSales = [];
let editId = null;
let pvzEditId = null;
let relEditId = null;
let currentTab = "dashboard";
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// --- Storage (Telegram CloudStorage with localStorage fallback) ---
async function loadData() {
  return new Promise((resolve) => {
    if (tg && tg.CloudStorage) {
      let loaded = 0;
      const done = () => { loaded++; if (loaded >= 3) resolve(); };
      tg.CloudStorage.getItem(STORAGE_KEY, (err, val) => {
        if (!err && val) { try { trades = JSON.parse(val); } catch(e) {} }
        done();
      });
      tg.CloudStorage.getItem(PVZ_STORAGE_KEY, (err, val) => {
        if (!err && val) { try { pvzOrders = JSON.parse(val); } catch(e) {} }
        done();
      });
      tg.CloudStorage.getItem(REL_STORAGE_KEY, (err, val) => {
        if (!err && val) {
          try {
            const d = JSON.parse(val);
            relSales = Array.isArray(d) ? d : (d.sales || []);
          } catch(e) {}
        }
        done();
      });
    } else {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) trades = JSON.parse(raw);
        const pvzRaw = localStorage.getItem(PVZ_STORAGE_KEY);
        if (pvzRaw) pvzOrders = JSON.parse(pvzRaw);
        const relRaw = localStorage.getItem(REL_STORAGE_KEY);
        if (relRaw) { const d = JSON.parse(relRaw); relSales = Array.isArray(d) ? d : (d.sales || []); }
      } catch(e) {}
      resolve();
    }
  });
}

function saveData() {
  const data = JSON.stringify(trades);
  const pvzData = JSON.stringify(pvzOrders);
  const relData = JSON.stringify(relSales);
  if (tg && tg.CloudStorage) {
    tg.CloudStorage.setItem(STORAGE_KEY, data);
    tg.CloudStorage.setItem(PVZ_STORAGE_KEY, pvzData);
    tg.CloudStorage.setItem(REL_STORAGE_KEY, relData);
  }
  try {
    localStorage.setItem(STORAGE_KEY, data);
    localStorage.setItem(PVZ_STORAGE_KEY, pvzData);
    localStorage.setItem(REL_STORAGE_KEY, relData);
  } catch(e) {}
}

// --- Helpers ---
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n) { return n == null ? "—" : n.toLocaleString("ru-RU") + " ₽"; }
function fmtDate(d) { return new Date(d).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}); }
function monthKey(d) { const dt=new Date(d); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0"); }
function monthLabel(k) { const[y,m]=k.split("-"); return MONTHS_RU[parseInt(m)-1]+" "+y; }

// --- Tabs ---
function switchTab(tab, el) {
  haptic("light");
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("dashboardTab").style.display = tab === "dashboard" ? "block" : "none";
  document.getElementById("tradesTab").style.display = tab === "trades" ? "block" : "none";
  document.getElementById("pvzTab").style.display = tab === "pvz" ? "block" : "none";
  document.getElementById("releaseTab").style.display = tab === "release" ? "block" : "none";
  if (tab === "pvz") renderPvz();
  if (tab === "release") renderRelease();
}

// --- Calendar Nav ---
function calPrev() { haptic("light"); calMonth--; if(calMonth<0){calMonth=11;calYear--;} render(); }
function calNext() { haptic("light"); calMonth++; if(calMonth>11){calMonth=0;calYear++;} render(); }
function calToday() { haptic("light"); const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); render(); }

// --- Model Select ---
function initModelSelect() {
  const sel = document.getElementById("fModel");
  sel.innerHTML = '<option value="">Выбрать модель...</option>';
  IPHONE_MODELS.forEach(m => {
    const o = document.createElement("option");
    o.value = m.label; o.textContent = m.label;
    sel.appendChild(o);
  });
}

function onModelChange() {
  const val = document.getElementById("fModel").value;
  const model = IPHONE_MODELS.find(m => m.label === val);
  const row = document.getElementById("storageColorRow");
  const manual = document.getElementById("manualNameRow");

  if (model) {
    row.style.display = "grid";
    manual.style.display = "none";
    const sSel = document.getElementById("fStorage");
    sSel.innerHTML = '<option value="">—</option>';
    model.storages.forEach(s => { const o=document.createElement("option"); o.value=s; o.textContent=s; sSel.appendChild(o); });
    const cSel = document.getElementById("fColor");
    cSel.innerHTML = '<option value="">—</option>';
    model.colors.forEach(c => { const o=document.createElement("option"); o.value=c; o.textContent=c; cSel.appendChild(o); });
  } else {
    row.style.display = "none";
    manual.style.display = "block";
  }
}

// --- Form ---
function changeQty(delta) {
  haptic("light");
  const inp = document.getElementById("fQty");
  let val = parseInt(inp.value) || 1;
  val = Math.max(1, Math.min(50, val + delta));
  inp.value = val;
}

function openForm(id) {
  haptic("medium");
  editId = id || null;
  document.getElementById("formTitle").textContent = editId ? "Редактировать" : "Новая продажа";
  document.getElementById("btnSubmit").textContent = editId ? "Сохранить" : "Добавить";
  // Hide qty when editing, show when adding
  document.getElementById("qtyField").style.display = editId ? "none" : "block";

  if (editId) {
    const t = trades.find(x => x.id === editId);
    if (!t) return;
    const found = IPHONE_MODELS.find(m => t.name.startsWith(m.label));
    if (found) {
      document.getElementById("fModel").value = found.label;
      onModelChange();
      const rest = t.name.slice(found.label.length).trim();
      const fs = found.storages.find(s => rest.includes(s));
      const fc = found.colors.find(c => rest.includes(c));
      if (fs) document.getElementById("fStorage").value = fs;
      if (fc) document.getElementById("fColor").value = fc;
      document.getElementById("fName").value = "";
    } else {
      document.getElementById("fModel").value = "";
      onModelChange();
      document.getElementById("fName").value = t.name;
    }
    document.getElementById("fBuy").value = t.buyPrice;
    document.getElementById("fSell").value = t.sellPrice != null ? t.sellPrice : "";
    document.getElementById("fDate").value = t.soldDate || t.date;
  } else {
    document.getElementById("fModel").value = "";
    onModelChange();
    document.getElementById("fName").value = "";
    document.getElementById("fBuy").value = "";
    document.getElementById("fSell").value = "";
    document.getElementById("fDate").value = new Date().toISOString().slice(0,10);
    document.getElementById("fQty").value = 1;
  }
  document.getElementById("overlay").classList.add("active");
}

function closeForm() {
  document.getElementById("overlay").classList.remove("active");
  editId = null;
}

function submitForm() {
  const modelVal = document.getElementById("fModel").value;
  const storage = document.getElementById("fStorage").value;
  const color = document.getElementById("fColor").value;
  const manualName = document.getElementById("fName").value.trim();
  const name = modelVal ? [modelVal, storage, color].filter(Boolean).join(" ") : manualName;
  const buyPrice = parseFloat(document.getElementById("fBuy").value);
  const sellRaw = document.getElementById("fSell").value;
  const sellPrice = sellRaw ? parseFloat(sellRaw) : null;
  const date = document.getElementById("fDate").value;
  const qty = editId ? 1 : Math.max(1, Math.min(50, parseInt(document.getElementById("fQty").value) || 1));

  if (!name || isNaN(buyPrice) || !date) return;

  haptic("heavy");

  if (editId) {
    const entry = {
      id: editId, name, buyPrice, sellPrice, date,
      soldDate: sellPrice != null ? date : null,
      status: sellPrice != null ? "sold" : "in_stock"
    };
    trades = trades.map(t => t.id === editId ? entry : t);
  } else {
    const newEntries = [];
    for (let i = 0; i < qty; i++) {
      newEntries.push({
        id: genId() + i,
        name, buyPrice, sellPrice, date,
        soldDate: sellPrice != null ? date : null,
        status: sellPrice != null ? "sold" : "in_stock"
      });
    }
    trades = [...newEntries, ...trades];
  }
  saveData();
  closeForm();
  render();
}

function deleteTrade(id) {
  haptic("heavy");
  if (!confirm("Удалить сделку?")) return;
  trades = trades.filter(t => t.id !== id);
  saveData();
  render();
}

// --- Export ---
function exportCSV() {
  haptic("light");
  if (!trades.length) return;
  const header = "Модель;Покупка;Продажа;Профит;Дата;Статус\n";
  const rows = trades.map(t => {
    const profit = t.sellPrice != null ? t.sellPrice - t.buyPrice : "";
    return [t.name, t.buyPrice, t.sellPrice||"", profit, t.soldDate||t.date, t.status==="sold"?"Продано":"В наличии"].join(";");
  }).join("\n");
  const bom = "\uFEFF";
  const blob = new Blob([bom + header + rows], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "PhoneFlip_export.csv";
  a.click();
}

// --- Render ---
function render() {
  const monthFilter = document.getElementById("monthFilter").value || "all";

  // Months
  const monthSet = new Set();
  trades.forEach(t => monthSet.add(monthKey(t.soldDate || t.date)));
  const months = [...monthSet].sort().reverse();
  const mf = document.getElementById("monthFilter");
  const curVal = mf.value;
  mf.innerHTML = '<option value="all">Все месяцы</option>';
  months.forEach(m => { const o=document.createElement("option"); o.value=m; o.textContent=monthLabel(m); mf.appendChild(o); });
  mf.value = months.includes(curVal) ? curVal : "all";
  const selMonth = mf.value;

  // Filter
  let filtered = trades;
  if (selMonth !== "all") filtered = filtered.filter(t => monthKey(t.soldDate||t.date) === selMonth);
  // Sort by date desc
  filtered = [...filtered].sort((a,b) => new Date(b.soldDate||b.date) - new Date(a.soldDate||a.date));

  document.getElementById("countLabel").textContent = filtered.length + " шт";

  // Stats
  const sold = filtered.filter(t => t.status==="sold" && t.sellPrice!=null);
  const totalProfit = sold.reduce((s,t) => s+(t.sellPrice-t.buyPrice), 0);
  const totalRevenue = sold.reduce((s,t) => s+t.sellPrice, 0);
  const avgProfit = sold.length ? totalProfit/sold.length : 0;
  const avgMargin = totalRevenue>0 ? (totalProfit/totalRevenue*100) : 0;
  const inStock = filtered.filter(t => t.status==="in_stock");
  const stockValue = inStock.reduce((s,t) => s+t.buyPrice, 0);
  const best = sold.length ? sold.reduce((b,t) => (t.sellPrice-t.buyPrice)>(b.sellPrice-b.buyPrice)?t:b) : null;
  const worst = sold.length ? sold.reduce((b,t) => (t.sellPrice-t.buyPrice)<(b.sellPrice-b.buyPrice)?t:b) : null;

  const profitColor = totalProfit>=0 ? "var(--accent)" : "var(--red)";
  const profitSign = totalProfit>=0 ? "+" : "";

  document.getElementById("stats").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">📊 Продаж</div>
        <div class="stat-value">${sold.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📈 Ср. профит</div>
        <div class="stat-value" style="color:${avgProfit>=0?'var(--accent)':'var(--red)'}; font-size:16px">${fmt(Math.round(avgProfit))}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📦 В наличии · ${inStock.length} шт</div>
        <div class="stat-value" style="color:var(--muted); font-size:16px">${fmt(stockValue)}</div>
      </div>
    </div>`;

  // Best/worst
  let bwHTML = "";
  if (best) {
    bwHTML += '<div class="deals-row">';
    bwHTML += `<div class="deal-card best">
      <div class="deal-label">🏆 Лучшая</div>
      <div class="deal-name">${best.name}</div>
      <div class="deal-profit" style="color:var(--accent)">+${fmt(best.sellPrice-best.buyPrice)}</div>
    </div>`;
    if (worst && sold.length > 1) {
      const wp = worst.sellPrice - worst.buyPrice;
      bwHTML += `<div class="deal-card ${wp<0?'worst-loss':'worst-ok'}">
        <div class="deal-label">📉 Худшая</div>
        <div class="deal-name">${worst.name}</div>
        <div class="deal-profit" style="color:${wp<0?'var(--red)':'var(--muted)'}">${wp>=0?'+':''}${fmt(wp)}</div>
      </div>`;
    }
    bwHTML += '</div>';
  }
  document.getElementById("bestWorst").innerHTML = bwHTML;

  // Calendar
  const DAYS_SHORT = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const daysInMonth = lastDay.getDate();
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  // Calc daily profits for this month
  const dailyProfit = {};
  let monthTotal = 0;
  trades.forEach(t => {
    if (t.status !== "sold" || t.sellPrice == null) return;
    const d = new Date(t.soldDate || t.date);
    if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
      const day = d.getDate();
      const p = t.sellPrice - t.buyPrice;
      dailyProfit[day] = (dailyProfit[day] || 0) + p;
      monthTotal += p;
    }
  });

  const monthTotalColor = monthTotal >= 0 ? "var(--accent)" : "var(--red)";
  const monthTotalSign = monthTotal >= 0 ? "+" : "";
  const calMonthLabel = MONTHS_RU[calMonth] + " " + calYear;
  const todayDate = new Date();
  const isCurrentMonth = todayDate.getFullYear() === calYear && todayDate.getMonth() === calMonth;

  let chartHTML = `<div class="chart-box">
    <div class="chart-title">
      <span>📅 ${calMonthLabel.toUpperCase()}</span>
      <div class="cal-nav">
        <button onclick="calPrev()">‹</button>
        <button onclick="calToday()">•</button>
        <button onclick="calNext()">›</button>
      </div>
    </div>
    <div class="cal-total" style="color:${monthTotalColor}">${monthTotalSign}${fmt(monthTotal)}</div>
    <div class="cal-grid">`;

  DAYS_SHORT.forEach(d => { chartHTML += `<div class="cal-head">${d}</div>`; });

  // Empty cells before 1st
  for (let i = 0; i < startDow; i++) chartHTML += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const profit = dailyProfit[d];
    const isToday = isCurrentMonth && d === todayDate.getDate();
    let cls = "cal-day";
    if (isToday) cls += " today";
    if (profit != null && profit > 0) cls += " has-profit";
    if (profit != null && profit < 0) cls += " has-loss";

    let profitHTML = "";
    if (profit != null) {
      const col = profit >= 0 ? "var(--accent)" : "var(--red)";
      const sign = profit >= 0 ? "+" : "";
      const short = Math.abs(profit) >= 1000 ? (sign + Math.round(profit/1000) + "k") : (sign + profit.toLocaleString("ru-RU"));
      profitHTML = `<div class="day-profit" style="color:${col}">${short}</div>`;
    }

    chartHTML += `<div class="${cls}">
      <div class="day-num">${d}</div>
      ${profitHTML}
    </div>`;
  }

  chartHTML += '</div></div>';
  document.getElementById("chart").innerHTML = chartHTML;

  // Trade cards
  if (filtered.length === 0) {
    document.getElementById("tradesList").innerHTML = '<div class="empty-state"><div class="empty-icon">📱</div><div class="empty-text">Нажми «+ Продажа» чтобы начать</div></div>';
    return;
  }

  let listHTML = "";
  filtered.forEach(t => {
    const profit = t.sellPrice != null ? t.sellPrice - t.buyPrice : null;
    const margin = (profit != null && t.sellPrice > 0) ? (profit / t.buyPrice * 100) : null;
    const statusClass = t.status==="sold" ? "status-sold" : "status-stock";
    const statusText = t.status==="sold" ? "Продано" : "В наличии";
    const profitColor = profit==null ? "var(--muted)" : profit>=0 ? "var(--accent)" : "var(--red)";
    const profitText = profit!=null ? (profit>=0?"+":"")+fmt(profit) : "—";
    const marginText = margin!=null ? (margin>=0?"+":"") + margin.toFixed(1) + "%" : "";

    listHTML += `<div class="trade-card">
      <div class="trade-top">
        <div class="trade-name">${t.name}</div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="trade-bottom">
        <div class="trade-prices">
          <div><span class="trade-price-label">Покупка</span>${fmt(t.buyPrice)}</div>
          <div><span class="trade-price-label">Продажа</span>${t.sellPrice!=null?fmt(t.sellPrice):'—'}</div>
        </div>
        <div>
          <div class="trade-profit" style="color:${profitColor}">${profitText}</div>
          ${marginText ? `<div class="trade-margin" style="color:${profitColor}">${marginText}</div>` : ''}
          <div class="trade-date">${fmtDate(t.soldDate||t.date)}</div>
        </div>
      </div>
      <div class="trade-actions">
        <button class="action-btn" onclick="openForm('${t.id}')">✏️ Изменить</button>
        <button class="action-btn" onclick="deleteTrade('${t.id}')">🗑 Удалить</button>
      </div>
    </div>`;
  });
  document.getElementById("tradesList").innerHTML = listHTML;
}

// --- PVZ Functions ---
function openPvzForm(id) {
  haptic("medium");
  pvzEditId = id || null;
  document.getElementById("pvzFormTitle").textContent = pvzEditId ? "Редактировать" : "Новый заказ";
  document.getElementById("pvzBtnSubmit").textContent = pvzEditId ? "Сохранить" : "Добавить";

  if (pvzEditId) {
    const o = pvzOrders.find(x => x.id === pvzEditId);
    if (!o) return;
    document.getElementById("pvzAmount").value = o.amount;
    document.getElementById("pvzPercent").value = o.percent;
    document.getElementById("pvzDate").value = o.date;
  } else {
    document.getElementById("pvzAmount").value = "";
    document.getElementById("pvzPercent").value = "2.5";
    document.getElementById("pvzDate").value = new Date().toISOString().slice(0,10);
  }
  updatePvzPreview();
  document.getElementById("pvzOverlay").classList.add("active");

  // Live preview
  document.getElementById("pvzAmount").oninput = updatePvzPreview;
  document.getElementById("pvzPercent").oninput = updatePvzPreview;
}

function closePvzForm() {
  document.getElementById("pvzOverlay").classList.remove("active");
  pvzEditId = null;
}

function updatePvzPreview() {
  const amount = parseFloat(document.getElementById("pvzAmount").value);
  const pct = parseFloat(document.getElementById("pvzPercent").value);
  const preview = document.getElementById("pvzPreview");
  if (amount > 0 && pct > 0) {
    const cashback = amount * pct / 100;
    document.getElementById("pvzPreviewValue").textContent = "+" + fmt(Math.round(cashback));
    preview.style.display = "block";
  } else {
    preview.style.display = "none";
  }
}


function submitPvzForm() {
  const amount = parseFloat(document.getElementById("pvzAmount").value);
  const percent = parseFloat(document.getElementById("pvzPercent").value);
  const date = document.getElementById("pvzDate").value;

  if (isNaN(amount) || amount <= 0 || isNaN(percent) || !date) return;

  haptic("heavy");

  if (pvzEditId) {
    pvzOrders = pvzOrders.map(o => o.id === pvzEditId ? { ...o, amount, percent, date, cashback: Math.round(amount * percent / 100) } : o);
  } else {
    pvzOrders.unshift({
      id: genId() + "p",
      amount, percent, date,
      cashback: Math.round(amount * percent / 100)
    });
  }
  saveData();
  closePvzForm();
  renderPvz();
}

function deletePvzOrder(id) {
  haptic("heavy");
  if (!confirm("Удалить заказ?")) return;
  pvzOrders = pvzOrders.filter(o => o.id !== id);
  saveData();
  renderPvz();
}

function renderPvz() {
  const mf = document.getElementById("pvzMonthFilter");
  const monthSet = new Set();
  pvzOrders.forEach(o => monthSet.add(monthKey(o.date)));
  const months = [...monthSet].sort().reverse();
  const curVal = mf.value;
  mf.innerHTML = '<option value="all">Все месяцы</option>';
  months.forEach(m => { const o=document.createElement("option"); o.value=m; o.textContent=monthLabel(m); mf.appendChild(o); });
  mf.value = months.includes(curVal) ? curVal : "all";
  const selMonth = mf.value;

  let filtered = pvzOrders;
  if (selMonth !== "all") filtered = filtered.filter(o => monthKey(o.date) === selMonth);
  filtered = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));

  document.getElementById("pvzCountLabel").textContent = filtered.length + " шт";

  const totalCashback = filtered.reduce((s,o) => s + o.cashback, 0);
  const totalAmount = filtered.reduce((s,o) => s + o.amount, 0);

  document.getElementById("pvzStats").innerHTML = `
    <div class="pvz-total-card">
      <div>
        <div class="pvz-total-label">💸 КЭШБЭК${selMonth !== 'all' ? ' · ' + monthLabel(selMonth) : ''}</div>
        <div class="pvz-total-value">+${fmt(totalCashback)}</div>
        <div class="pvz-total-count">Заказов: ${filtered.length} · Оборот: ${fmt(totalAmount)}</div>
      </div>
    </div>`;

  if (filtered.length === 0) {
    document.getElementById("pvzList").innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Нажми «+ Заказ» чтобы начать</div></div>';
    return;
  }

  let html = "";
  filtered.forEach(o => {
    html += `<div class="pvz-card">
      <div class="pvz-left">
        <div class="pvz-amount">${fmt(o.amount)}</div>
        <div class="pvz-meta">${fmtDate(o.date)} · ${o.percent}%</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div>
          <div class="pvz-cashback">+${fmt(o.cashback)}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:2px">
          <button class="action-btn" style="padding:4px 8px;font-size:11px" onclick="openPvzForm('${o.id}')">✏️</button>
          <button class="action-btn" style="padding:4px 8px;font-size:11px" onclick="deletePvzOrder('${o.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("pvzList").innerHTML = html;
}

// --- Release Functions ---
function initRelModelSelect() {
  const sel = document.getElementById("relModel");
  sel.innerHTML = '<option value="">Выбрать модель...</option>';
  IPHONE_MODELS.forEach(m => {
    const o = document.createElement("option");
    o.value = m.label; o.textContent = m.label;
    sel.appendChild(o);
  });
}

function onRelModelChange() {
  const val = document.getElementById("relModel").value;
  const model = IPHONE_MODELS.find(m => m.label === val);
  const row = document.getElementById("relStorageColorRow");
  const manual = document.getElementById("relManualNameRow");
  if (model) {
    row.style.display = "grid";
    manual.style.display = "none";
    const sSel = document.getElementById("relStorage");
    sSel.innerHTML = '<option value="">—</option>';
    model.storages.forEach(s => { const o=document.createElement("option"); o.value=s; o.textContent=s; sSel.appendChild(o); });
    const cSel = document.getElementById("relColor");
    cSel.innerHTML = '<option value="">—</option>';
    model.colors.forEach(c => { const o=document.createElement("option"); o.value=c; o.textContent=c; cSel.appendChild(o); });
  } else {
    row.style.display = "none";
    manual.style.display = "block";
  }
}

function openRelForm(id) {
  haptic("medium");
  relEditId = id || null;
  document.getElementById("relFormTitle").textContent = relEditId ? "Редактировать" : "Новая продажа";
  document.getElementById("relBtnSubmit").textContent = relEditId ? "Сохранить" : "Добавить";

  if (relEditId) {
    const s = relSales.find(x => x.id === relEditId);
    if (!s) return;
    document.getElementById("relOwner").value = s.owner || "";
    const found = IPHONE_MODELS.find(m => s.name.startsWith(m.label));
    if (found) {
      document.getElementById("relModel").value = found.label;
      onRelModelChange();
      const rest = s.name.slice(found.label.length).trim();
      const fs = found.storages.find(st => rest.includes(st));
      const fc = found.colors.find(c => rest.includes(c));
      if (fs) document.getElementById("relStorage").value = fs;
      if (fc) document.getElementById("relColor").value = fc;
      document.getElementById("relName").value = "";
    } else {
      document.getElementById("relModel").value = "";
      onRelModelChange();
      document.getElementById("relName").value = s.name;
    }
    document.getElementById("relSellPrice").value = s.sellPrice;
    document.getElementById("relRate").value = s.rate;
    document.getElementById("relDate").value = s.date;
  } else {
    document.getElementById("relOwner").value = "";
    document.getElementById("relModel").value = "";
    onRelModelChange();
    document.getElementById("relName").value = "";
    document.getElementById("relSellPrice").value = "";
    document.getElementById("relRate").value = "1000";
    document.getElementById("relDate").value = new Date().toISOString().slice(0,10);
  }
  document.getElementById("relOverlay").classList.add("active");
}

function closeRelForm() {
  document.getElementById("relOverlay").classList.remove("active");
  relEditId = null;
}

function submitRelForm() {
  const owner = document.getElementById("relOwner").value.trim();
  const modelVal = document.getElementById("relModel").value;
  const storage = document.getElementById("relStorage").value;
  const color = document.getElementById("relColor").value;
  const manualName = document.getElementById("relName").value.trim();
  const name = modelVal ? [modelVal, storage, color].filter(Boolean).join(" ") : manualName;
  const sellPrice = parseFloat(document.getElementById("relSellPrice").value);
  const rate = parseFloat(document.getElementById("relRate").value) || 1000;
  const date = document.getElementById("relDate").value;

  if (!name || isNaN(sellPrice) || !date) return;
  haptic("heavy");

  if (relEditId) {
    relSales = relSales.map(s => s.id === relEditId ? { ...s, owner, name, sellPrice, rate, date } : s);
  } else {
    relSales.unshift({ id: genId() + "r", owner, name, sellPrice, rate, date });
  }
  saveData();
  closeRelForm();
  renderRelease();
}

function deleteRelSale(id) {
  haptic("heavy");
  if (!confirm("Удалить?")) return;
  relSales = relSales.filter(s => s.id !== id);
  saveData();
  renderRelease();
}

function renderRelease() {

  const mf = document.getElementById("relMonthFilter");
  const of = document.getElementById("relOwnerFilter");

  // Month filter
  const monthSet = new Set();
  relSales.forEach(s => monthSet.add(monthKey(s.date)));
  const months = [...monthSet].sort().reverse();
  const curMonth = mf.value;
  mf.innerHTML = '<option value="all">Все месяцы</option>';
  months.forEach(m => { const o=document.createElement("option"); o.value=m; o.textContent=monthLabel(m); mf.appendChild(o); });
  mf.value = months.includes(curMonth) ? curMonth : "all";

  // Owner filter
  const owners = [...new Set(relSales.map(s => s.owner).filter(Boolean))].sort();
  const curOwner = of.value;
  of.innerHTML = '<option value="all">Все</option>';
  owners.forEach(o => { const opt=document.createElement("option"); opt.value=o; opt.textContent=o; of.appendChild(opt); });
  of.value = owners.includes(curOwner) ? curOwner : "all";

  let filtered = relSales;
  if (mf.value !== "all") filtered = filtered.filter(s => monthKey(s.date) === mf.value);
  if (of.value !== "all") filtered = filtered.filter(s => s.owner === of.value);
  filtered = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));

  document.getElementById("relCountLabel").textContent = filtered.length + " шт";

  const totalEarned = filtered.reduce((s,r) => s + r.rate, 0);
  const totalSold = filtered.reduce((s,r) => s + r.sellPrice, 0);

  document.getElementById("relStats").innerHTML = `
    <div class="rel-stats-row">
      <div class="rel-stat">
        <div class="rel-stat-label">💰 Заработок</div>
        <div class="rel-stat-value" style="color:var(--accent)">+${fmt(totalEarned)}</div>
      </div>
      <div class="rel-stat">
        <div class="rel-stat-label">📱 Продано</div>
        <div class="rel-stat-value">${filtered.length}</div>
      </div>
    </div>`;

  if (filtered.length === 0) {
    document.getElementById("relList").innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Нажми «+ Продажа»</div></div>';
    return;
  }

  let html = "";
  filtered.forEach(s => {
    const ownerBadge = s.owner ? `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--muted);font-weight:600">${s.owner}</span>` : '';
    html += `<div class="rel-card">
      <div>
        <div class="rel-card-name">${s.name} ${ownerBadge}</div>
        <div class="rel-card-meta">${fmtDate(s.date)} · Продажа: ${fmt(s.sellPrice)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="rel-card-earn">+${fmt(s.rate)}</div>
        <div style="display:flex;flex-direction:column;gap:2px">
          <button class="action-btn" style="padding:4px 8px;font-size:11px" onclick="openRelForm('${s.id}')">✏️</button>
          <button class="action-btn" style="padding:4px 8px;font-size:11px" onclick="deleteRelSale('${s.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById("relList").innerHTML = html;
}

// --- Init ---
(async () => {
  await loadData();
  initModelSelect();
  initRelModelSelect();
  render();
  renderPvz();
  renderRelease();
})();

// --- PWA Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
